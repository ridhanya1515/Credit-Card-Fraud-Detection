[theme]
primaryColor = "#667eea"
backgroundColor = "#f0f5ff"
secondaryBackgroundColor = "#e6f0ff"
textColor = "#1f4e79"
font = "sans serif"

[client]
showErrorDetails = true
toolbarMode = "minimal"

[logger]
level = "info"

[server]
port = 8501
headless = true
runOnSave = true
maxUploadSize = 200
enableXsrfProtection = true

[browser]
gatherUsageStats = false
